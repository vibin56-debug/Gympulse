<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymPulse Dashboard</title>
  <script type="module" crossorigin src="/assets/index-BLbbv78g.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B7ijAQWk.css">
</head>
<body>
  <main>
    <header>
      <h1>GymPulse Local Dashboard</h1>
      <p>Manage members and track gym attendance in real-time.</p>
      <div class="page-links">
        <a href="scan.html">Open Scan Landing Page</a>
      </div>
    </header>

    <section class="card">
      <h2>Member Registration</h2>
      <div class="form-row">
        <label for="registerName">Name</label>
        <input id="registerName" type="text" placeholder="Member name" />
      </div>
      <div class="form-row">
        <label for="registerEmail">Email</label>
        <input id="registerEmail" type="email" placeholder="Member email" />
      </div>
      <button id="registerMemberButton">Create Member</button>
      <p id="registrationResult" class="notice"></p>
      <div id="registrationOutput" class="registration-output hidden">
        <p><strong>Member ID:</strong> <span id="generatedMemberId"></span></p>
        <p><strong>Member Name:</strong> <span id="generatedMemberName"></span></p>
        <div id="qrCodeContainer" style="text-align: center; margin: 16px 0;">
          <p><strong>Scan QR Code:</strong></p>
          <canvas id="qrCodeCanvas"></canvas>
        </div>
        <p><strong>Scan URL:</strong> <a id="generatedScanLink" href="#" target="_blank"></a></p>
        <button id="downloadQrButton">Download QR Code</button>
      </div>
    </section>

    <section class="card">
      <h2>Members Dashboard</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Member ID</th>
            <th>Join Date</th>
            <th>Last Scan</th>
            <th>Visits</th>
            <th>Frequency</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="membersList"></tbody>
      </table>
      <p id="dashboardStatus" class="notice">Loading members...</p>
    </section>
  </main>

</body>
</html>
